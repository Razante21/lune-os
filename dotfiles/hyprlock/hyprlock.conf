general {
    hide_cursor = true
}

background {
    monitor =
    path = ~/.config/lune/wallpapers/default.jpg
    blur_passes = 3
    blur_size = 8
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(232, 232, 240, 0.95)
    font_size = 72
    font_family = Inter Light
    position = 0, 80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 0
    inner_color = rgba(26, 27, 38, 0.6)
    font_color = rgba(232, 232, 240, 0.9)
    rounding = 12
    check_color = rgba(200, 168, 233, 1.0)
    fail_color = rgba(235, 87, 87, 0.8)
    position = 0, -100
    halign = center
    valign = center
}
