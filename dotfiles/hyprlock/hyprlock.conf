# Lune OS — Hyprlock Configuration
# Tela de bloqueio elegante com relógio e avatar

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = false
}

# ── Wallpaper com blur ───────────────────────────────────────
background {
    monitor =
    path = ~/.config/lune/wallpapers/current.jpg

    blur_passes = 4
    blur_size = 8
    noise = 0.02
    contrast = 1.0
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# ── Logo Lune OS ─────────────────────────────────────────────
image {
    monitor =
    path = ~/.config/lune/logo.png
    size = 60
    rounding = -1
    border_size = 0
    halign = center
    valign = center
    position = 0, 160
    opacity = 0.9
}

# ── Relógio — Hora ───────────────────────────────────────────
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(232, 232, 240, 0.95)
    font_size = 72
    font_family = Inter Light
    position = 0, 80
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(13, 14, 20, 0.5)
}

# ── Relógio — Data ───────────────────────────────────────────
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d de %B')"
    color = rgba(160, 160, 176, 0.85)
    font_size = 18
    font_family = Inter
    position = 0, 16
    halign = center
    valign = center
}

# ── Avatar do usuário ────────────────────────────────────────
image {
    monitor =
    path = /var/lib/AccountsService/icons/$USER
    size = 56
    rounding = -1
    border_size = 2
    border_color = rgba(200, 168, 233, 0.8)
    halign = center
    valign = center
    position = 0, -80
    opacity = 1.0
}

# ── Nome do usuário ──────────────────────────────────────────
label {
    monitor =
    text = $USER
    color = rgba(232, 232, 240, 0.9)
    font_size = 16
    font_family = Inter SemiBold
    position = 0, -120
    halign = center
    valign = center
}

# ── Campo de senha ───────────────────────────────────────────
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 0
    dots_size = 0.28
    dots_spacing = 0.2
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(200, 168, 233, 0.0)
    inner_color = rgba(26, 27, 38, 0.6)
    font_color = rgba(232, 232, 240, 0.9)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <span foreground="##A0A0B0">●●●●●●●●</span>
    hide_input = false
    rounding = 12
    check_color = rgba(200, 168, 233, 1.0)
    fail_color = rgba(235, 87, 87, 0.8)
    fail_text = <span foreground="##EB5757">Senha incorreta</span>
    fail_transition = 300
    position = 0, -172
    halign = center
    valign = center

    # Borda lilás quando digitando
    capslock_color = rgba(242, 153, 74, 0.8)
    numlock_color = rgba(200, 168, 233, 0.6)
    bothlock_color = rgba(242, 153, 74, 0.8)
    invert_numlock = false
}

# ── Dica ─────────────────────────────────────────────────────
label {
    monitor =
    text = Pressione Enter para desbloquear
    color = rgba(160, 160, 176, 0.5)
    font_size = 12
    font_family = Inter
    position = 0, -226
    halign = center
    valign = center
}

# ── Assinatura Lune OS ───────────────────────────────────────
label {
    monitor =
    text = Lune OS
    color = rgba(200, 168, 233, 0.4)
    font_size = 11
    font_family = Inter Medium
    position = 0, -48
    halign = center
    valign = bottom
}
