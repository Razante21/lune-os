# Lune OS — Kitty Terminal Configuration

# ── Fonte ────────────────────────────────────────────────────
font_family         JetBrainsMono Nerd Font
bold_font           JetBrainsMono Nerd Font Bold
italic_font         JetBrainsMono Nerd Font Italic
bold_italic_font    JetBrainsMono Nerd Font Bold Italic
font_size           13.0

# ── Ajustes de fonte ─────────────────────────────────────────
adjust_line_height  110%
adjust_column_width 0
disable_ligatures   never

# ── Cursor ───────────────────────────────────────────────────
cursor_shape        beam
cursor_beam_thickness 1.5
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# ── Scroll ───────────────────────────────────────────────────
scrollback_lines    10000
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 3.0

# ── Mouse ────────────────────────────────────────────────────
mouse_hide_wait     2.0
copy_on_select      no
focus_follows_mouse no

# ── Performance ──────────────────────────────────────────────
repaint_delay       8
input_delay         2
sync_to_monitor     yes

# ── Bell ─────────────────────────────────────────────────────
enable_audio_bell   no
visual_bell_duration 0.0

# ── Janela ───────────────────────────────────────────────────
remember_window_size   yes
initial_window_width   900
initial_window_height  600
window_padding_width   12 16
placement_strategy     center

# ── Tabs ─────────────────────────────────────────────────────
tab_bar_style       powerline
tab_powerline_style round
tab_bar_min_tabs    2
active_tab_font_style   bold
inactive_tab_font_style normal

# ── Transparência e blur ─────────────────────────────────────
background_opacity  0.90
dynamic_background_opacity yes

# ── Cores — Lune Dark theme ──────────────────────────────────
# Fundo e texto
background            #0D0E14
foreground            #E8E8F0

# Cursor
cursor                #C8A8E9
cursor_text_color     #0D0E14

# Seleção
selection_background  #C8A8E930
selection_foreground  #E8E8F0

# URL
url_color             #7EB8F7
url_style             curly

# Cores base (0-7)
color0  #1A1B26
color1  #F7768E
color2  #9ECE6A
color3  #E0AF68
color4  #7EB8F7
color5  #C8A8E9
color6  #7DCFFF
color7  #A0A0B0

# Cores brilhantes (8-15)
color8  #2E2F3E
color9  #FF8FAB
color10 #B9F27C
color11 #F3C975
color12 #92CAFF
color13 #D4BBFF
color14 #A9DAFF
color15 #E8E8F0

# Tab bar
active_tab_background   #C8A8E9
active_tab_foreground   #0D0E14
inactive_tab_background #1A1B26
inactive_tab_foreground #A0A0B0
tab_bar_background      #0D0E14

# ── Atalhos ──────────────────────────────────────────────────
map ctrl+shift+c  copy_to_clipboard
map ctrl+shift+v  paste_from_clipboard
map ctrl+shift+t  new_tab
map ctrl+shift+w  close_tab
map ctrl+tab      next_tab
map ctrl+shift+tab previous_tab
map ctrl+shift+enter new_window
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0  change_font_size all 0
map ctrl+shift+f  show_scrollback

# ── Shell ────────────────────────────────────────────────────
shell               zsh
editor              .
close_on_child_death no
allow_remote_control yes
listen_on           unix:/tmp/kitty
