font_family JetBrainsMono Nerd Font
font_size 12.0

cursor_shape beam
scrollback_lines 10000

background_opacity 0.92
window_padding_width 12

background #0D0E14
foreground #E8E8F0
cursor #C8A8E9

color0  #1A1B26
color1  #F7768E
color2  #9ECE6A
color3  #E0AF68
color4  #7EB8F7
color5  #C8A8E9
color6  #7DCFFF
color7  #A0A0B0
color8  #2E2F3E
color9  #FF8FAB
color10 #B9F27C
color11 #F3C975
color12 #92CAFF
color13 #D4BBFF
color14 #A9DAFF
color15 #E8E8F0

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
