# Lune OS — Autostart Configuration
# Compatível com Hyprland 0.53+ (2026)
# Nota: use start-hyprland para iniciar, não Hyprland diretamente

# ── Wallpaper daemon ─────────────────────────────────────────
# swww continua sendo a opção recomendada para wallpapers dinâmicos
exec-once = swww-daemon --format xrgb
exec-once = sleep 1 && swww img ~/.config/lune/wallpapers/default.jpg \
    --transition-type fade --transition-duration 0.8

# ── Interface ────────────────────────────────────────────────
exec-once = waybar
exec-once = swaync

# ── Autenticação ─────────────────────────────────────────────
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# ── Clipboard ────────────────────────────────────────────────
exec-once = wl-paste --watch cliphist store

# ── XDG portal ───────────────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd \
    WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user import-environment \
    WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE

# ── Idle / bloqueio ──────────────────────────────────────────
exec-once = hypridle

# ── Rede e Bluetooth ─────────────────────────────────────────
exec-once = nm-applet --indicator
exec-once = blueman-applet

# ── Adaptive Color System ────────────────────────────────────
exec-once = sleep 2 && bash ~/.config/hypr/scripts/apply-colors.sh

# ── Verificação de startup ───────────────────────────────────
exec-once = sleep 30 && bash ~/.config/hypr/scripts/startup-check.sh
