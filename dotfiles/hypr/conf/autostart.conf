# Lune OS — Autostart Configuration
# Apps que iniciam com o Hyprland

# ── Essenciais ───────────────────────────────────────────────
# Wallpaper daemon (swww)
exec-once = swww-daemon
exec-once = sleep 1 && swww img ~/.config/lune/wallpapers/default.jpg --transition-type fade

# Waybar — as três ilhas
exec-once = waybar

# Notificações (Swaync)
exec-once = swaync

# Autenticação (polkit)
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Gerenciador de clipboard
exec-once = wl-paste --watch cliphist store

# XDG portal (compatibilidade com apps)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# ── Idle e bloqueio ──────────────────────────────────────────
exec-once = hypridle

# ── Bluetooth e rede ─────────────────────────────────────────
exec-once = nm-applet --indicator
exec-once = blueman-applet

# ── Wallust — Adaptive Color System ─────────────────────────
# Aplica cores do wallpaper ao iniciar
exec-once = sleep 2 && bash ~/.config/hypr/scripts/apply-colors.sh

# ── Lune Update Check (silencioso) ───────────────────────────
exec-once = sleep 30 && bash ~/.config/hypr/scripts/startup-check.sh
