# Lune OS — Appearance Configuration
# Bordas, blur, sombras, arredondamento
# Sintaxe Hyprland 0.53+ / 0.54

decoration {
    rounding = 12

    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    # Sombra — glow lilás sutil
    shadow {
        enabled = true
        range = 25
        render_power = 3
        offset = 0 0
        color = rgba(C8A8E940)
        color_inactive = rgba(0D0E1420)
    }

    # Blur — glassmorphism
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = false
        noise = 0.02
        contrast = 1.1
        brightness = 0.9
        popups = true
        popups_ignorealpha = 0.6
    }
}
