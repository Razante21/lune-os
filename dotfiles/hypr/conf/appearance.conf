# Lune OS — Appearance Configuration
# Bordas, blur, sombras, arredondamento

decoration {
    # Arredondamento das janelas
    rounding = 12

    # Opacidade
    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    # Sombra — glow lilás sutil
    drop_shadow = true
    shadow_range = 25
    shadow_render_power = 3
    shadow_offset = 0 0
    col.shadow = rgba(C8A8E940)
    col.shadow_inactive = rgba(0D0E1420)

    # Blur — glassmorphism
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        xray = false
        noise = 0.02
        contrast = 1.1
        brightness = 0.9
        popups = true
        popups_ignorealpha = 0.6
    }
}
