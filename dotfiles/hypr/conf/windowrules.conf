# Lune OS — Window Rules (Hyprland 0.53+)

# ── Flutuantes ───────────────────────────────────────────────
windowrulev2 = float,  class:^(pavucontrol)$
windowrulev2 = float,  class:^(blueman-manager)$
windowrulev2 = float,  class:^(nm-connection-editor)$
windowrulev2 = float,  class:^(gnome-calculator)$
windowrulev2 = float,  class:^(org.gnome.Calculator)$
windowrulev2 = float,  class:^(file-roller)$
windowrulev2 = float,  title:^(Abrir arquivo)$
windowrulev2 = float,  title:^(Salvar arquivo)$
windowrulev2 = float,  title:^(Salvar como)$

# ── Tamanhos ─────────────────────────────────────────────────
windowrulev2 = size 800 600, class:^(pavucontrol)$
windowrulev2 = size 900 650, class:^(blueman-manager)$
windowrulev2 = size 500 400, class:^(gnome-calculator)$

# ── Centralizar ──────────────────────────────────────────────
windowrulev2 = center, class:^(pavucontrol)$
windowrulev2 = center, class:^(blueman-manager)$
windowrulev2 = center, class:^(gnome-calculator)$
windowrulev2 = center, class:^(file-roller)$

# ── Opacidade ────────────────────────────────────────────────
windowrulev2 = opacity 0.95 0.85, class:^(kitty)$
windowrulev2 = opacity 0.98 0.95, class:^(Code)$
windowrulev2 = opacity 1.0 1.0,   class:^(google-chrome)$
windowrulev2 = opacity 1.0 1.0,   class:^(vlc)$

# ── Workspace por app ────────────────────────────────────────
windowrulev2 = workspace 2, class:^(google-chrome)$
windowrulev2 = workspace 3, class:^(Code)$
windowrulev2 = workspace 4, class:^(discord)$
windowrulev2 = workspace 4, class:^(telegram-desktop)$
windowrulev2 = workspace 5, class:^(Spotify)$

# ── Wine ─────────────────────────────────────────────────────
windowrulev2 = float,  class:^(.*\.exe)$
windowrulev2 = center, class:^(.*\.exe)$

# ── Layer rules (sintaxe antiga, sem match:namespace) ────────
layerrule = blur,       swaync-control-center
layerrule = blur,       swaync-notification-window
layerrule = ignorezero, swaync-control-center
layerrule = ignorezero, swaync-notification-window

layerrule = blur,       waybar
layerrule = ignorezero, waybar

layerrule = blur,       rofi
layerrule = ignorezero, rofi
layerrule = dimaround,  rofi