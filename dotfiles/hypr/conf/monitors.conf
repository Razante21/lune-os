# Lune OS — Monitors Configuration
# Detectado automaticamente pelo script de instalação
# Edite conforme necessário

# Monitor principal — detecta automaticamente resolução e refresh rate
monitor = , preferred, auto, 1

# Exemplos de configurações manuais:
# monitor = HDMI-A-1, 1920x1080@144, 0x0, 1
# monitor = DP-1, 2560x1440@165, 0x0, 1
# monitor = eDP-1, 1920x1080@60, 0x0, 1   # notebook

# Workspace padrão por monitor
workspace = 1, monitor:, default:true
workspace = 2, monitor:
workspace = 3, monitor:
workspace = 4, monitor:
workspace = 5, monitor:
