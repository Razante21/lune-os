# Lune OS — Keybinds Configuration
# 53 atalhos organizados por categoria

$mod = SUPER
$term = kitty
$files = nautilus
$launcher = rofi -show drun -theme ~/.config/rofi/lune.rasi
$browser = google-chrome-stable

# ── Apps e Sistema ───────────────────────────────────────────
bind = $mod, Space,      exec, $launcher
bind = $mod, E,          exec, $files
bind = $mod, T,          exec, $term
bind = $mod, A,          exec, ~/.config/hypr/scripts/lune-assistant.sh
bind = $mod, I,          exec, ~/.config/hypr/scripts/lune-settings.sh
bind = $mod, S,          exec, ~/.config/hypr/scripts/lune-store.sh
bind = $mod, F1,         exec, ~/.config/hypr/scripts/lune-help.sh
bind = $mod, M,          exec, $term -e btop
bind = $mod, C,          exec, gnome-calculator
bind = $mod, W,          exec, ~/.config/hypr/scripts/wallpaper-picker.sh

# ── Cheat Sheet (segura Super por 1s) ────────────────────────
bind = $mod, Super_L,    exec, ~/.config/hypr/scripts/cheat-sheet.sh

# ── Janelas ──────────────────────────────────────────────────
bind = $mod, Q,          killactive
bind = $mod, N,          movetoworkspacesilent, special:minimized
bind = $mod, Up,         fullscreen, 0
bind = $mod, F11,        fullscreen, 0
bind = $mod, V,          togglefloating
bind = $mod, P,          pseudo
bind = $mod, J,          layoutmsg, togglesplit

# Mover janela com teclado
bind = $mod, left,       movefocus, l
bind = $mod, right,      movefocus, r
bind = $mod, up,         movefocus, u
bind = $mod, down,       movefocus, d

# Redimensionar janela
bind = $mod SHIFT, left,  resizeactive, -40 0
bind = $mod SHIFT, right, resizeactive, 40 0
bind = $mod SHIFT, up,    resizeactive, 0 -40
bind = $mod SHIFT, down,  resizeactive, 0 40

# Fechar todos os apps do workspace
bind = $mod SHIFT, Q,    exec, ~/.config/hypr/scripts/close-all-workspace.sh

# Mover janela para workspace
bind = $mod SHIFT, 1,    movetoworkspace, 1
bind = $mod SHIFT, 2,    movetoworkspace, 2
bind = $mod SHIFT, 3,    movetoworkspace, 3
bind = $mod SHIFT, 4,    movetoworkspace, 4
bind = $mod SHIFT, 5,    movetoworkspace, 5

# ── Workspaces ───────────────────────────────────────────────
bind = $mod, 1,          workspace, 1
bind = $mod, 2,          workspace, 2
bind = $mod, 3,          workspace, 3
bind = $mod, 4,          workspace, 4
bind = $mod, 5,          workspace, 5
bind = $mod, bracketleft,  workspace, e-1
bind = $mod, bracketright, workspace, e+1
bind = $mod, Tab,        exec, ~/.config/hypr/scripts/overview.sh

# ── Visual e Temas ───────────────────────────────────────────
bind = $mod, F,          exec, ~/.config/hypr/scripts/focus-mode.sh
bind = CTRL ALT, T,      exec, ~/.config/hypr/scripts/theme-selector.sh
bind = $mod SHIFT, R,    exec, hyprctl reload
bind = $mod, D,          exec, ~/.config/hypr/scripts/toggle-dock.sh
bind = $mod, B,          exec, ~/.config/hypr/scripts/toggle-bar.sh

# ── Captura de tela ──────────────────────────────────────────
bind = $mod SHIFT, S,    exec, grimblast copy area
bind = ,      Print,     exec, grimblast copy screen
bind = ALT,   Print,     exec, grimblast copy active
bind = $mod SHIFT, G,    exec, ~/.config/hypr/scripts/screenrecord.sh

# ── Áudio e Mídia ────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous

# Brilho (notebooks)
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── Sistema e Sessão ─────────────────────────────────────────
bind = $mod, L,          exec, hyprlock
bind = $mod, Escape,     exec, wlogout -p layer-shell
bind = $mod SHIFT, Escape, exit
bind = $mod SHIFT, Y,    exec, ~/.config/hypr/scripts/lune-sync.sh
bind = $mod, U,          exec, ~/.config/hypr/scripts/check-updates.sh

# ── Lune Assistant ───────────────────────────────────────────
bind = $mod, A,          exec, ~/.config/hypr/scripts/lune-assistant.sh
bind = $mod SHIFT, A,    exec, ~/.config/hypr/scripts/lune-assistant-new.sh

# ── Mouse ────────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Workspace com scroll ─────────────────────────────────────
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1
