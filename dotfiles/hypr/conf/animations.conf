# Lune OS — Animations Configuration
# Animações suaves estilo premium — inspiradas no End-4

animations {
    enabled = true

    # ── Curvas de bezier ──────────────────────────────────────
    # easeOutExpo: rápida no início, desacelera suave no fim
    bezier = easeOutExpo,  0.16, 1, 0.3, 1
    # easeOutQuart: similar mas um pouco mais dramática
    bezier = easeOutQuart, 0.25, 1, 0.5, 1
    # easeOutBack: leve overshoot no fim (pop feeling)
    bezier = easeOutBack,  0.34, 1.56, 0.64, 1
    # linear: para rotação de bordas
    bezier = linear,       0, 0, 1, 1
    # easeInOut: suave nos dois extremos
    bezier = easeInOut,    0.45, 0, 0.55, 1

    # ── Janelas ───────────────────────────────────────────────
    # Abrir: slide leve de baixo + fade in
    animation = windowsIn,   1, 3, easeOutBack,  slide
    # Fechar: fade out rápido e discreto
    animation = windowsOut,  1, 2, easeInOut,    fade
    # Mover/redimensionar: suave
    animation = windowsMove, 1, 3, easeOutExpo,  slide

    # ── Fade ──────────────────────────────────────────────────
    animation = fade,        1, 2, easeOutExpo
    animation = fadeIn,      1, 2, easeOutExpo
    animation = fadeOut,     1, 2, easeInOut
    animation = fadeDim,     1, 2, easeInOut

    # ── Workspaces ────────────────────────────────────────────
    # Troca: slide horizontal suave
    animation = workspaces,        1, 4, easeOutExpo, slide
    animation = specialWorkspace,  1, 3, easeOutExpo, slidevert

    # ── Bordas ────────────────────────────────────────────────
    # Gradiente animado rodando infinitamente
    animation = borderangle, 1, 8, linear, loop

    # ── Layers (Waybar, Rofi, etc) ───────────────────────────
    animation = layers,    1, 3, easeOutExpo, slide
    animation = layersIn,  1, 3, easeOutBack
    animation = layersOut, 1, 2, easeInOut
}
