# Lune OS — Hyprland Config para VM
# Versão minimalista sem dependências pesadas
# Compatível com VirtualBox + VMware SVGA

# ── Variáveis de ambiente para VM ───────────────────────────
env = WLR_RENDERER,pixman
env = WLR_NO_HARDWARE_CURSORS,1
env = LIBGL_ALWAYS_SOFTWARE,1
env = WLR_LIBINPUT_NO_DEVICES,1

# ── Monitor ──────────────────────────────────────────────────
monitor = , preferred, auto, 1

# ── Input ────────────────────────────────────────────────────
input {
    kb_layout = br
    follow_mouse = 1
    sensitivity = 0
}

# ── Visual mínimo ────────────────────────────────────────────
general {
    gaps_in = 6
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(C8A8E9ff) rgba(7EB8F7ff) 45deg
    col.inactive_border = rgba(2E2F3Eff)
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 1.0

    # Blur desativado na VM (performance)
    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }
}

animations {
    enabled = false
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

dwindle {
    pseudotile = true
    preserve_split = true
}

# ── Autostart mínimo ─────────────────────────────────────────
exec-once = waybar
exec-once = swaync

# ── Atalhos básicos ──────────────────────────────────────────
$mod = SUPER

bind = $mod, T,      exec, kitty
bind = $mod, Q,      killactive
bind = $mod, Space,  exec, rofi -show drun
bind = $mod, F,      fullscreen
bind = $mod, V,      togglefloating
bind = $mod, 1,      workspace, 1
bind = $mod, 2,      workspace, 2
bind = $mod, 3,      workspace, 3
bind = $mod, 4,      workspace, 4
bind = $mod, 5,      workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod, left,   movefocus, l
bind = $mod, right,  movefocus, r
bind = $mod, up,     movefocus, u
bind = $mod, down,   movefocus, d
bind = $mod, L,      exec, hyprlock
bind = $mod, Escape, exec, wlogout

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
