# Your world, just lighter.
# Hyprland Configuration v0.1.1
# Compatível com Hyprland 0.53+ / 0.54 (2026)

# ── Módulos ──────────────────────────────────────────────────
source = ~/.config/hypr/conf/monitors.conf
source = ~/.config/hypr/conf/appearance.conf
source = ~/.config/hypr/conf/animations.conf
source = ~/.config/hypr/conf/keybinds.conf
source = ~/.config/hypr/conf/windowrules.conf
source = ~/.config/hypr/conf/autostart.conf
source = ~/.config/hypr/conf/environment.conf

# ── Input ────────────────────────────────────────────────────
input {
    kb_layout = br
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
        scroll_factor = 0.8
    }
}

# ── Gestures (nova sintaxe 0.51+) ────────────────────────────
# workspace_swipe, workspace_swipe_fingers e similares foram removidos no 0.51+
# Agora usa-se `gesture = N_DEDOS, DIRECAO, ACAO`
gestures {
    workspace_swipe_distance = 300
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_forever = true

    # 3 dedos horizontal = trocar workspace
    gesture = 3, horizontal, workspace
}

# ── Layout ───────────────────────────────────────────────────
general {
    gaps_in = 10
    gaps_out = 14
    border_size = 2

    col.active_border   = rgba(C8A8E9ff) rgba(7EB8F7ff) 45deg
    col.inactive_border = rgba(2E2F3Eff)

    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

# ── Misc ─────────────────────────────────────────────────────
misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
    enable_swallow           = true
    swallow_regex            = ^(kitty)$
    focus_on_activate        = false

    # v0.53+: substitui new_window_takes_over_fullscreen
    on_focus_under_fullscreen = 2
}

# ── Dwindle ──────────────────────────────────────────────────
dwindle {
    pseudotile    = true
    preserve_split = true
}

# ── Master ───────────────────────────────────────────────────
master {
    new_status = master
    new_on_top = true
    mfact      = 0.5
}
