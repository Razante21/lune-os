# Hyprland Configuration — v0.1.0

# ── Importar módulos ─────────────────────────────────────────
source = ~/.config/hypr/conf/monitors.conf
source = ~/.config/hypr/conf/appearance.conf
source = ~/.config/hypr/conf/animations.conf
source = ~/.config/hypr/conf/keybinds.conf
source = ~/.config/hypr/conf/windowrules.conf
source = ~/.config/hypr/conf/autostart.conf
source = ~/.config/hypr/conf/environment.conf

# ── Importar config de GPU (gerado pelo gpu-detect.sh) ───────
source = ~/.config/hypr/conf/nvidia.conf

# ── Input ────────────────────────────────────────────────────
input {
    kb_layout = br
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
        drag_lock = true
        scroll_factor = 0.8
    }

    # Gestos de touchpad
    gestures {
        workspace_swipe = true
        workspace_swipe_fingers = 3
        workspace_swipe_distance = 300
        workspace_swipe_invert = true
        workspace_swipe_min_speed_to_force = 30
        workspace_swipe_cancel_ratio = 0.5
        workspace_swipe_create_new = false
    }
}

# ── Layout de janelas ────────────────────────────────────────
general {
    gaps_in = 10
    gaps_out = 14
    border_size = 2

    # Gradiente animado lilás → azul (Lune Dark theme)
    col.active_border = rgba(C8A8E9ff) rgba(7EB8F7ff) 45deg
    col.inactive_border = rgba(2E2F3Eff)

    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

# ── Misc ─────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    enable_swallow = true
    swallow_regex = ^(kitty|Alacritty)$
    focus_on_activate = false
    new_window_takes_over_fullscreen = 2
}

# ── Dwindle layout ───────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = true
    smart_resizing = true
}

# ── Master layout ────────────────────────────────────────────
master {
    new_status = master
    new_on_top = true
    mfact = 0.5
}
